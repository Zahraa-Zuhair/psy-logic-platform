<html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة Psy-Logic الذكية | المستشار النفسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-yellow: #faff00; --deep-black: #0a0a0a; --soft-gray: #151515; --danger: #ff4444; --safe: #00ff88; --accent: #38ef7d; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--deep-black); color: #fff; margin: 0; transition: 0.5s; overflow-x: hidden; }
        @keyframes pulse-red { 0% { box-shadow: inset 0 0 50px #000; } 50% { box-shadow: inset 0 0 100px rgba(255, 68, 68, 0.2); } 100% { box-shadow: inset 0 0 50px #000; } }
        .critical-mood { animation: pulse-red 2s infinite; }
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(ellipse at bottom, #1B2735 0%, #050505 100%); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: blink 3s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .container { max-width: 550px; margin: auto; padding: 20px; min-height: 100vh; }
        .card { background: var(--soft-gray); border-radius: 30px; padding: 35px; border: 1px solid rgba(250, 255, 0, 0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center; margin-top: 50px; }
        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--neon-yellow), var(--accent)); width: 0%; transition: 0.4s; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #333; background: #000; color: var(--neon-yellow); font-size: 1rem; text-align: center; outline: none; box-sizing: border-box; }
        textarea { text-align: right; height: 80px; resize: none; }
        .result-circle { width: 160px; height: 160px; border-radius: 50%; border: 6px solid var(--neon-yellow); margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; font-weight: 900; color: var(--neon-yellow); box-shadow: 0 0 30px rgba(250, 255, 0, 0.2); }
        .btn-green { background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%); color: #000; border: none; padding: 18px; border-radius: 15px; width: 100%; font-size: 1.1rem; font-weight: 900; cursor: pointer; margin-top: 15px; }
        .btn-outline { background: transparent; border: 2px solid var(--neon-yellow); color: var(--neon-yellow); padding: 12px; border-radius: 15px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .doctor-section { margin-top: 60px; padding: 20px; background: rgba(0,0,0,0.9); border-radius: 20px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 20px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #222; }
        .status-tag { padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 0.75rem; color: #000; }
        .hidden { display: none; }
    </style>
</head>
<body id="mainBody">

<div class="stars-container" id="stars"></div>

<div class="container">
    <div id="step1" class="card">
        <h1>العيادة النفسية الذكية 🧬</h1>
        <p style="color: #666;">نظام تشخيص تفاعلي متقدم</p>
        <input type="text" id="pName" placeholder="اسم المريض بالكامل">
        <input type="number" id="pAge" placeholder="عمر المريض">
        <button class="btn-green" onclick="startQuiz()">بدء جلسة التشخيص الشامل</button>
        <button class="btn-outline" style="border-color: #444; color: #666;" onclick="unlockDoctor()">دخول الطبيب 🔒</button>
    </div>

    <div id="step2" class="card hidden">
        <small id="qCount" style="color: #666;">سؤال 1 من 15</small>
        <div class="progress-bar"><div id="pFill" class="progress-fill"></div></div>
        <h2 id="qTitle" style="color: var(--neon-yellow); font-size: 1.2rem;"></h2>
        <div id="optionsArea"></div>
    </div>

    <div id="step3" class="card hidden">
        <div class="result-circle" id="finalScore">0%</div>
        <h2 id="resultTitle">--</h2>
        <textarea id="drNote" placeholder="أدخل ملاحظاتك الطبية هنا..."></textarea>
        <button class="btn-green" onclick="finalSave()">حفظ في الأرشيف</button>
        <button class="btn-outline" onclick="shareToWhatsApp()">مشاركة التقرير 💬</button>
    </div>

    <div id="doctorPanel" class="doctor-section hidden">
        <h3 style="color: var(--neon-yellow);">👨‍⚕️ الأرشيف السري</h3>
        <table id="logTable">
            <thead><tr><th>المريض</th><th>الحالة</th><th>الملاحظات</th></tr></thead>
            <tbody id="logBody"></tbody>
        </table>
        <button class="btn-outline" style="color: var(--danger); border-color: var(--danger);" onclick="clearLogs()">مسح السجل</button>
    </div>
</div>

<script>
    for(let i=0; i<100; i++) {
        let s = document.createElement('div'); s.className = 'star';
        s.style.width = s.style.height = Math.random()*3+'px';
        s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
        document.getElementById('stars').appendChild(s);
    }

    let currentQ = 0, totalScore = 0;
    const questions = [
        { q: "هل تجد صعوبة في النوم رغم شعورك بالتعب؟", weights: [10, 5, 0] },
        { q: "هل تشعر بنوبات قلق مفاجئة بدون سبب؟", weights: [10, 5, 0] },
        { q: "هل فقدت الشغف بهواياتك المفضلة؟", weights: [10, 5, 0] },
        { q: "هل تشعر بسرعة الغضب تجاه المقربين منك؟", weights: [10, 5, 0] },
        { q: "كيف تصف قدرتك على التركيز مؤخراً؟", weights: [10, 5, 0] },
        { q: "هل تعاني من آلام جسدية ناتجة عن التوتر؟", weights: [10, 5, 0] },
        { q: "هل تفكر كثيراً في مواقف سلبية من الماضي؟", weights: [10, 5, 0] },
        { q: "هل تشعر بالارتباك عند التحدث مع الغرباء؟", weights: [10, 5, 0] },
        { q: "هل تسيطر عليك رغبة في البكاء بدون سبب؟", weights: [10, 5, 0] },
        { q: "هل تشعر بأنك تحمل أعباءً فوق طاقتك؟", weights: [10, 5, 0] },
        { q: "هل لاحظت تغيراً كبيراً في شهيتك للأكل؟", weights: [10, 5, 0] },
        { q: "هل تشعر بالذنب تجاه أمور لست مسؤولاً عنها؟", weights: [10, 5, 0] },
        { q: "هل تجد صعوبة في التفاؤل بالمستقبل؟", weights: [10, 5, 0] },
        { q: "هل تفضل الانعزال وحيداً لفترات طويلة؟", weights: [10, 5, 0] },
        { q: "هل تحس بصداع مستمر عند التفكير في مشاكلك؟", weights: [10, 5, 0] }
    ];

    function startQuiz() {
        if(!document.getElementById('pName').value) return alert("سجل اسم المريض");
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        showQ();
    }

    function showQ() {
        let q = questions[currentQ];
        document.getElementById('qCount').innerText = `سؤال ${currentQ + 1} من 15`;
        document.getElementById('pFill').style.width = ((currentQ / 15) * 100) + "%";
        document.getElementById('qTitle').innerText = q.q;
        let area = document.getElementById('optionsArea'); area.innerHTML = "";
        ["نادراً", "أحياناً", "دائماً"].forEach((o, i) => {
            let b = document.createElement('button'); b.className = 'btn-outline'; b.innerText = o;
            b.onclick = () => { totalScore += q.weights[i]; currentQ++; currentQ < 15 ? showQ() : finish(); };
            area.appendChild(b);
        });
    }

    function finish() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        let perc = Math.round((totalScore / 150) * 100);
        document.getElementById('finalScore').innerText = perc + "%";
        if(perc < 45) {
            document.getElementById('mainBody').classList.add('critical-mood');
            document.getElementById('resultTitle').innerText = "حالة حرجة 🚨";
        } else {
            document.getElementById('resultTitle').innerText = "حالة مستقرة ✨";
        }
    }

    function finalSave() {
        let log = JSON.parse(localStorage.getItem('psyPro') || '[]');
        log.push({ name: document.getElementById('pName').value, age: document.getElementById('pAge').value, score: document.getElementById('finalScore').innerText, note: document.getElementById('drNote').value || "لا توجد" });
        localStorage.setItem('psyPro', JSON.stringify(log));
        alert("تم الحفظ"); location.reload();
    }

    function unlockDoctor() {
        if(prompt("كلمة السر:") === "1234") {
            document.getElementById('doctorPanel').classList.remove('hidden');
            loadLogs();
        } else { alert("خطأ"); }
    }

    function loadLogs() {
        let log = JSON.parse(localStorage.getItem('psyPro') || '[]');
        let body = document.getElementById('logBody'); body.innerHTML = "";
        log.reverse().forEach(e => {
            body.innerHTML += `<tr><td>${e.name}</td><td>${e.score}</td><td>${e.note}</td></tr>`;
        });
    }

    function shareToWhatsApp() {
        let text = `المريض: ${document.getElementById('pName').value} \nالنسبة: ${document.getElementById('finalScore').innerText}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    function clearLogs() { if(confirm("حذف؟")) { localStorage.removeItem('psyPro'); loadLogs(); } }
</script>
</body>
</html>
